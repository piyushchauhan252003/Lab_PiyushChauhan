<!DOCTYPE html>
<html>
<head>
    <title>Even Odd Checker</title>
</head>
<body>

<h2>Even or Odd Checker</h2>

<input type="number" id="num" placeholder="Enter number">
<button onclick="check()">Check</button>

<p id="output"></p>

<script>
function check() {
    let n = document.getElementById("num").value;

    if (n == "") {
        document.getElementById("output").innerHTML = "Enter a number!";
    }
    else if (n % 2 == 0) {
        document.getElementById("output").innerHTML = n + " is Even";
    }
    else {
        document.getElementById("output").innerHTML = n + " is Odd";
    }
}
</script>

</body>
</html>
