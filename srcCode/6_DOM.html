<!DOCTYPE html>
<html>
<head>
    <title>DOM</title>
</head>
<body>

<h2 id="heading">Enter Your Name</h2>

<input type="text" id="name" name="username" class="inputBox" placeholder="Type your name">
<br><br>

<button onclick="showName()">Submit</button>

<p id="output" class="text"></p>

<script>
function showName() {

    // getElementById
    let userName = document.getElementById("name").value;

    // getElementsByName
    let nameField = document.getElementsByName("username");
    
    // getElementsByClassName
    let para = document.getElementsByClassName("text");

    // getElementsByTagName
    let heading = document.getElementsByTagName("h2");

    para[0].innerHTML = "Hello " + userName + "!";

    heading[0].style.color = "blue";

    nameField[0].style.border = "2px solid green";
}
</script>

</body>
</html>
