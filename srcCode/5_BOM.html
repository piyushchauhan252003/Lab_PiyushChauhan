<!DOCTYPE html>
<html>
<head>
    <title>BOM</title>
</head>
<body>

<h2>BOM Information</h2>

<button onclick="showInfo()">Show Info</button>

<p id="result"></p>

<script>
function showInfo() {
    document.getElementById("result").innerHTML =
        "<b>Screen Info:</b><br>" +
        "Width: " + screen.width + "<br>" +
        "Height: " + screen.height + "<br><br>" +

        "<b>Navigator Info:</b><br>" +
        "Browser: " + navigator.appName + "<br>" +
        "Platform: " + navigator.platform + "<br><br>" +

        "<b>Window Info:</b><br>" +
        "URL: " + window.location.href + "<br><br>" +

        "<b>History Info:</b><br>" +
        "History Length: " + history.length;
}
</script>

</body>
</html>
