<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calculator</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#667eea,#764ba2);
  font-family:Arial;
}

.calculator{
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  width:300px;
}

#display{
  width:100%;
  height:60px;
  font-size:28px;
  border:none;
  border-radius:12px;
  text-align:right;
  padding:10px;
  margin-bottom:15px;
  background:rgba(255,255,255,0.2);
  color:white;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

button{
  height:55px;
  font-size:20px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.1);
}

.num{
  background:rgba(255,255,255,0.2);
  color:white;
}

.op{
  background:#ff9f43;
  color:white;
}

.equal{
  background:#2ecc71;
  color:white;
  grid-column: span 2;
  border-radius:25px;
}

.clear{
  background:#e74c3c;
  color:white;
}
</style>

</head>

<body>

<div class="calculator">
  <input type="text" id="display" readonly>

  <div class="buttons">
    <button class="clear" onclick="clr()">C</button>
    <button class="op" onclick="add('/')">÷</button>
    <button class="op" onclick="add('*')">×</button>
    <button class="op" onclick="add('-')">−</button>

    <button class="num" onclick="add('7')">7</button>
    <button class="num" onclick="add('8')">8</button>
    <button class="num" onclick="add('9')">9</button>
    <button class="op" onclick="add('+')">+</button>

    <button class="num" onclick="add('4')">4</button>
    <button class="num" onclick="add('5')">5</button>
    <button class="num" onclick="add('6')">6</button>
    <button class="equal" onclick="calc()">=</button>

    <button class="num" onclick="add('1')">1</button>
    <button class="num" onclick="add('2')">2</button>
    <button class="num" onclick="add('3')">3</button>
    <button class="num" onclick="add('.')">.</button>

    <button class="num" onclick="add('0')">0</button>
  </div>
</div>

<script>
function add(v){
  document.getElementById("display").value += v;
}

function clr(){
  document.getElementById("display").value = "";
}

function calc(){
  try{
    document.getElementById("display").value =
      eval(document.getElementById("display").value);
  }catch{
    document.getElementById("display").value = "Error";
  }
}
</script>

</body>
</html>
